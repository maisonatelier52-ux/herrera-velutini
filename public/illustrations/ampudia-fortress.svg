  <title id="title">Ampudia fortress diagram</title>
  <desc id="desc">Abstract diagram connecting Ampudia, the castle, and the early Herrera lineage.</desc>
  <rect width="960" height="640" fill="#f6f1e7"/>
  <rect x="56" y="56" width="848" height="528" rx="28" fill="#fbf7f0" stroke="#d7c8b4"/>
  <rect x="220" y="208" width="520" height="248" rx="20" fill="#fffdf9" stroke="#1d252d" stroke-width="2"/>
  <rect x="190" y="178" width="88" height="88" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <rect x="682" y="178" width="88" height="88" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <rect x="190" y="398" width="88" height="88" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <rect x="682" y="398" width="88" height="88" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <rect x="430" y="330" width="100" height="126" fill="#efe2ce" stroke="#1d252d" stroke-width="2"/>
