  <text x="480" y="548" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="18" fill="#1d252d">HERNAN DE HERRERA  ->  PEDRO GARCIA DE HERRERA</text>
  <text x="480" y="574" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="14" fill="#5d6570">early lineage, estate, and place memory</text>
