    <text x="335" y="520" font-size="24">Hacienda de La Vega and Atlantic memory</text>
    <text x="540" y="520" font-size="24">Naples founding and merchant-banking continuity</text>
    <text x="762" y="520" font-size="24">Marriage and family convergence in Caracas</text>
    <text x="907" y="520" font-size="24">Seventh and eighth generation transition</text>
