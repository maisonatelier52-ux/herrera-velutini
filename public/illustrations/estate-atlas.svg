<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
<title id="t">Estate atlas diagram</title>
<desc id="d">An original atlas-style diagram situating Caracas, Lanzarote, Ampudia, Uslar, and Gleichen in the portal's estate geography.</desc>
<rect width="1200" height="720" rx="36" fill="#0b1422"/>
<g fill="#13233a" stroke="#f5d88d" stroke-opacity=".25">
  <rect x="110" y="110" width="980" height="500" rx="30"/>
</g>
<g fill="#f5d88d">
  <circle cx="250" cy="430" r="12"/><circle cx="530" cy="225" r="12"/><circle cx="660" cy="210" r="12"/><circle cx="780" cy="230" r="12"/><circle cx="860" cy="200" r="12"/>
</g>
<g font-family="Georgia, serif" fill="#eef2f8">
  <text x="220" y="470" font-size="28">Caracas</text>
  <text x="485" y="190" font-size="28">Lanzarote</text>
  <text x="635" y="180" font-size="28">Ampudia</text>
  <text x="760" y="195" font-size="28">Uslar</text>
  <text x="830" y="170" font-size="28">Gleichen</text>
</g>
<g font-family="Inter,Arial,sans-serif" fill="#c4c9d4" font-size="20">
  <text x="250" y="505" text-anchor="middle">Hacienda de La Vega</text>
  <text x="530" y="255" text-anchor="middle">Castle Santa Barbara</text>
  <text x="600" y="655" text-anchor="middle">Estates make lineage legible by giving the record a map, a skyline, and a material timeline.</text>
</g>
<g fill="none" stroke="#f5d88d" stroke-opacity=".35" stroke-width="3">
  <path d="M250 430C340 380 410 320 530 225"/>
  <path d="M530 225C575 220 615 215 660 210"/>
  <path d="M660 210C710 215 745 220 780 230"/>
  <path d="M780 230C810 220 835 210 860 200"/>
</g>
</svg>