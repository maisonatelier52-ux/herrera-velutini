<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Julio Cesar banking diagram</title>
  <desc id="desc">Abstract diagram connecting Julio Cesar Velutini Couturier with Banco Caracas, finance, and industrial-era continuity.</desc>
  <rect width="960" height="640" fill="#f6f1e7"/>
  <rect x="56" y="56" width="848" height="528" rx="28" fill="#fbf7f0" stroke="#d7c8b4"/>
  <circle cx="278" cy="224" r="96" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <rect x="474" y="152" width="262" height="156" rx="18" fill="#fffdf9" stroke="#1d252d" stroke-width="2"/>
  <rect x="512" y="190" width="186" height="18" rx="9" fill="#efe2ce"/>
  <rect x="512" y="228" width="150" height="14" rx="7" fill="#efe2ce"/>
  <rect x="512" y="256" width="166" height="14" rx="7" fill="#efe2ce"/>
  <circle cx="606" cy="430" r="104" fill="#fffdf9" stroke="#1d252d" stroke-width="2"/>
  <path d="M364 226 L474 226" stroke="#8c6530" stroke-width="3" stroke-linecap="round"/>
  <path d="M338 282 L518 374" stroke="#1d252d" stroke-width="3" stroke-linecap="round"/>
  <text x="278" y="216" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="24" fill="#1d252d">JULIO CESAR</text>
  <text x="278" y="244" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="16" fill="#5d6570">1881-1939</text>
  <text x="606" y="212" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="24" fill="#1d252d">BANCO CARACAS</text>
  <text x="606" y="238" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="14" fill="#5d6570">institutional anchor</text>
  <text x="606" y="422" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="22" fill="#1d252d">RAILROADS</text>
  <text x="606" y="452" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="22" fill="#1d252d">INDUSTRY</text>
  <text x="606" y="482" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="15" fill="#5d6570">industrial-age finance</text>
</svg>
