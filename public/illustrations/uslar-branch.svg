<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Uslar branch diagram</title>
  <desc id="desc">Abstract diagram connecting Uslar to Freudenthal, heraldry, and the Uslar-Gleichen branch layer.</desc>
  <rect width="960" height="640" fill="#f6f1e7"/>
  <rect x="60" y="60" width="840" height="520" rx="28" fill="#fbf7f0" stroke="#d7c8b4"/>
  <rect x="165" y="165" width="220" height="180" rx="24" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <circle cx="700" cy="220" r="84" fill="#ffffff" stroke="#b89a70" stroke-width="2"/>
  <rect x="325" y="392" width="310" height="108" rx="22" fill="#fffdf9" stroke="#1d252d" stroke-width="2"/>
  <path d="M385 255 L610 228" stroke="#8c6530" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 338 L420 392" stroke="#1d252d" stroke-width="3" stroke-linecap="round"/>
  <path d="M650 300 L545 392" stroke="#1d252d" stroke-width="3" stroke-linecap="round"/>
  <text x="275" y="236" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="28" fill="#1d252d">USLAR</text>
  <text x="275" y="272" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="16" fill="#5d6570">1006/1007 town memory</text>
  <text x="700" y="214" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="22" fill="#1d252d">FREUDENTHAL</text>
  <text x="700" y="244" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="14" fill="#5d6570">castle built 1599</text>
  <text x="480" y="438" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="24" fill="#1d252d">COAT OF ARMS + BRANCH NAME</text>
  <text x="480" y="472" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="16" fill="#5d6570">Uslar becomes part of the compound German memory layer</text>
</svg>
