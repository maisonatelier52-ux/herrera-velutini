<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Naples origin diagram</title>
  <desc id="desc">Abstract diagram connecting Naples to France, Corsica, Mediterranean trade, and the later Caracas chapter.</desc>
  <rect width="960" height="640" fill="#f6f1e7"/>
  <rect x="60" y="60" width="840" height="520" rx="28" fill="#fbf7f0" stroke="#d7c8b4"/>
  <circle cx="250" cy="220" r="88" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <circle cx="505" cy="180" r="58" fill="#ffffff" stroke="#b89a70"/>
  <circle cx="665" cy="245" r="58" fill="#ffffff" stroke="#b89a70"/>
  <circle cx="470" cy="420" r="108" fill="#fffdf9" stroke="#1d252d" stroke-width="2"/>
  <path d="M325 215 L445 188" stroke="#8c6530" stroke-width="3" stroke-linecap="round"/>
  <path d="M334 238 L607 247" stroke="#8c6530" stroke-width="3" stroke-linecap="round"/>
  <path d="M286 285 L419 362" stroke="#1d252d" stroke-width="3" stroke-linecap="round"/>
  <path d="M528 220 L494 317" stroke="#1d252d" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M648 300 L534 378" stroke="#1d252d" stroke-width="2.5" stroke-linecap="round"/>
  <text x="250" y="214" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="28" fill="#1d252d">NAPLES</text>
  <text x="250" y="247" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="15" fill="#5d6570">1781 origin</text>
  <text x="505" y="186" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="20" fill="#1d252d">FRANCE</text>
  <text x="665" y="251" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="20" fill="#1d252d">CORSICA</text>
  <text x="470" y="400" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="28" fill="#1d252d">MEDITERRANEAN</text>
  <text x="470" y="432" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="18" fill="#5d6570">trade, diplomacy, expansion</text>
  <text x="470" y="520" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="16" letter-spacing="2" fill="#8c6530">CARACAS FOLLOWS IN THE NEXT GENERATION</text>
</svg>
