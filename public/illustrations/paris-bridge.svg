<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Paris bridge diagram</title>
  <desc id="desc">Abstract diagram connecting Paris to Clementina's education, Banvelca's European presence, and the later global office network.</desc>
  <rect width="960" height="640" fill="#f6f1e7"/>
  <rect x="60" y="60" width="840" height="520" rx="28" fill="#fbf7f0" stroke="#d7c8b4"/>
  <circle cx="480" cy="200" r="88" fill="#efe2ce" stroke="#8c6530" stroke-width="2"/>
  <circle cx="265" cy="380" r="72" fill="#ffffff" stroke="#b89a70"/>
  <circle cx="695" cy="380" r="72" fill="#ffffff" stroke="#b89a70"/>
  <rect x="330" y="420" width="300" height="96" rx="18" fill="#fffdf9" stroke="#1d252d" stroke-width="2"/>
  <path d="M430 274 L308 334" stroke="#8c6530" stroke-width="3" stroke-linecap="round"/>
  <path d="M530 274 L652 334" stroke="#8c6530" stroke-width="3" stroke-linecap="round"/>
  <path d="M480 288 L480 420" stroke="#1d252d" stroke-width="3" stroke-linecap="round"/>
  <text x="480" y="194" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="30" fill="#1d252d">PARIS</text>
  <text x="480" y="228" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="16" fill="#5d6570">education and Europe bridge</text>
  <text x="265" y="374" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="20" fill="#1d252d">CLEMENTINA</text>
  <text x="265" y="402" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="14" fill="#5d6570">private schools</text>
  <text x="695" y="374" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="20" fill="#1d252d">BANVELCA</text>
  <text x="695" y="402" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="14" fill="#5d6570">global offices</text>
  <text x="480" y="458" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="24" fill="#1d252d">TRANSATLANTIC CONTINUITY</text>
  <text x="480" y="490" text-anchor="middle" font-family="'Avenir Next', Arial, sans-serif" font-size="16" fill="#5d6570">twentieth-century formation to present-day presence</text>
</svg>
